name: CI

on:
    push:
        branches: [main]
    pull_request:
        types: [opened, reopened, synchronize]
    merge_group:
    workflow_dispatch:
        inputs:
            maintain_release_pull_request:
                default: false
                required: false
                type: boolean
            release_pull_request_number:
                required: false
                type: string

permissions: {}

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: true
            matrix:
                node: [22, 24, 26]
        name: Node ${{ matrix.node }}
        permissions:
            contents: read # required for actions/checkout to read the repository source
            pull-requests: read # required to read release PR files and metadata
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  fetch-depth: 0
                  persist-credentials: false
            - name: Use Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: ${{ matrix.node }}
            - name: Install dependencies
              run: npm clean-install
            - name: Compile
              run: npx just compile
            - name: Run linters
              run: npx just lint
            - name: Run tests
              run: npx just test
              timeout-minutes: 20
            - name: Check packages
              if: matrix.node == 24
              env:
                  GH_TOKEN: ${{ github.token }}
              run: npx just publish-dry-run
            - name: Coveralls
              uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  path-to-lcov: ./target/coverage/lcov.info
                  parallel: true
    workflow-security:
        runs-on: ubuntu-latest
        name: Workflow security analysis
        permissions:
            contents: read # required for actions/checkout to read the workflow source
            security-events: write # required by zizmor-action to upload SARIF to code scanning
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  persist-credentials: false
            - name: Run zizmor
              id: zizmor
              uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
              with:
                  version: 1.27.0
                  persona: pedantic
                  min-severity: informational
                  min-confidence: low
                  config: .github/zizmor.yml
            - name: Fail if zizmor reported findings
              env:
                  SARIF_FILE: ${{ steps.zizmor.outputs.output-file }}
              run: |
                  count="$(jq '[.runs[].results[]] | length' "$SARIF_FILE")"
                  echo "zizmor findings: $count"
                  test "$count" -eq 0
    release-pr-policy:
        needs: build
        runs-on: ubuntu-latest
        name: Release PR policy
        if: >
            github.event_name == 'pull_request' ||
            github.event_name == 'merge_group' ||
            (github.event_name == 'workflow_dispatch' && github.ref_name == 'release/eslint-plugin-mocha')
        permissions:
            contents: read # required for actions/checkout to read the repository source
            pull-requests: read # required to read release PR files and metadata
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  persist-credentials: false
            - name: Use Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: 24
            - name: Install dependencies
              run: npm clean-install --ignore-scripts
            - name: Validate release pull request
              if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: npx just validate-release-pr
    mutation-testing:
        needs: build
        runs-on: ubuntu-latest
        name: Mutation testing
        permissions:
            contents: read # required for actions/checkout to read the repository source
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  persist-credentials: false
            - name: Use Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: 26
            - name: Install dependencies
              run: npm clean-install
            - name: Run mutation tests
              run: npx just test-mutation
              timeout-minutes: 30
    publish-release:
        needs: [build, release-pr-policy, mutation-testing]
        name: Publish release
        if: >
            !failure() &&
            !cancelled() &&
            (
                github.event_name == 'push' ||
                (github.event_name == 'workflow_dispatch' && inputs.release_pull_request_number != '')
            )
        uses: ./.github/workflows/release-publish.yml
        permissions:
            contents: write # required to push release tags and create GitHub releases
            id-token: write # required by npm trusted publishing to mint the OIDC token
            pull-requests: read # required to validate release PR identity before publishing
        with:
            release_pull_request_number: ${{ inputs.release_pull_request_number || '' }}
    maintain-release-pr:
        needs: [build, release-pr-policy, mutation-testing, publish-release]
        runs-on: ubuntu-latest
        name: Maintain release PR
        if: >
            !failure() &&
            !cancelled() &&
            (
                github.event_name == 'push' ||
                (
                    github.event_name == 'workflow_dispatch' &&
                    inputs.maintain_release_pull_request &&
                    inputs.release_pull_request_number == ''
                )
            ) &&
            needs.publish-release.result != 'failure' &&
            needs.publish-release.result != 'cancelled'
        permissions:
            actions: write # required to dispatch release PR CI and delete gated PR runs
            contents: write # required to push and delete the release branch
            issues: write # required to replace release PR labels
            pull-requests: write # required to create, update, and close release PRs
            statuses: write # required to mirror dispatched release PR CI results
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  ref: main
                  fetch-depth: 0
                  persist-credentials: true
            - name: Use Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: 24
            - name: Install dependencies
              run: npm clean-install --ignore-scripts
            - name: Configure release author
              run: |
                  git config user.name 'github-actions[bot]'
                  git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            - name: Maintain release pull request
              env:
                  GH_TOKEN: ${{ github.token }}
              run: npx just prepare-release
    coverage:
        needs: build
        runs-on: ubuntu-latest
        name: Coveralls Finished
        permissions:
            contents: read # required by coverallsapp/github-action to read repository metadata
        steps:
            - name: Coveralls Finished
              uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  parallel-finished: true
